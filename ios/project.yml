name: AsrBenchIOS
options:
  bundleIdPrefix: ai.moonshine.asrbench
  deploymentTarget:
    iOS: "17.0"   # SFSpeechRecognizer needs iOS 10+; Moonshine swift needs iOS 14+
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGNING_ALLOWED: NO   # simulator-only build, skip signing
packages:
  Moonshine:
    url: https://github.com/moonshine-ai/moonshine-swift
    exactVersion: "0.0.51"
targets:
  AsrBenchIOS:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources/audio
        type: folder
        buildPhase: resources
      - path: Resources/moonshine-models
        type: folder
        buildPhase: resources
        optional: true   # may be empty until model files are downloaded
    info:
      path: Info.plist
      properties:
        UILaunchScreen: {}
        UIRequiredDeviceCapabilities:
          - arm64
        NSSpeechRecognitionUsageDescription: "Required to benchmark Apple's on-device Speech framework against Moonshine."
        NSMicrophoneUsageDescription: "Not used at runtime, but Speech framework requires this string to exist."
    dependencies:
      - package: Moonshine
        product: MoonshineVoice
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
